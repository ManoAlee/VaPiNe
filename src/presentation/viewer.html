<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaPiNe | Hyper-Res Viewer</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #ef4444;
            --panel: rgba(20, 20, 20, 0.9);
            --border: rgba(239, 68, 68, 0.3);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        #remote-canvas {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: #000;
            filter: contrast(1.1) brightness(0.9);
        }

        .overlay-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 1rem;
            background: var(--panel);
            backdrop-filter: blur(10px);
            border-radius: 4px;
            border-left: 4px solid var(--accent);
            pointer-events: none;
        }

        .badge {
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .metrics {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            background: var(--panel);
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            opacity: 0.7;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <canvas id="remote-canvas" title="VaPiNe Sentinel - Live Stream Simulation"></canvas>

    <div class="overlay-ui">
        <span class="badge">SECURE LINK: ACTIVE</span>
        <div class="metrics">
            LAT: <span id="lat">6ms</span> | FPS: <span id="fps">120</span> | BAND: <span id="band">6GHz</span>
        </div>
        <div id="spectrum-monitor" style="margin-top: 10px; font-size: 0.7rem; color: var(--accent);">
            SENTINEL SHIELD: <span style="color: #22c55e;">ENABLED</span> | MLO: <span
                style="color: #22c55e;">OPTIMAL</span>
        </div>
    </div>

    <!-- Matrix HUD Overlay -->
    <div id="matrix-grid"
        style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; background-image: radial-gradient(rgba(239, 68, 68, 0.1) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.3;">
    </div>

    <div id="scanner-line"
        style="position:absolute; top:0; left:0; width:100%; height:2px; background: var(--accent); opacity: 0.4; animation: scan 3s linear infinite;">
    </div>

    <div class="controls">
        <button class="btn">TERMINAL</button>
        <button class="btn">DECRYPT</button>
        <button class="btn" style="color: #ef4444;">DISCONNECT</button>
    </div>

    <style>
        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }
    </style>

    <script>
        // VaPiNe Sentinel - Visual Stream Simulation
        const canvas = document.getElementById('remote-canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        function draw() {
            // Simulated Data Stream Noise (Digital Rain style)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ef444422';
            for (let i = 0; i < 30; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const w = Math.random() * 150;
                ctx.fillRect(x, y, w, 1);
            }

            // Central Tactical Lock
            ctx.strokeStyle = '#ef444488';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 120 + Math.sin(Date.now() / 400) * 15, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 150, canvas.height / 2);
            ctx.lineTo(canvas.width / 2 + 150, canvas.height / 2);
            ctx.moveTo(canvas.width / 2, canvas.height / 2 - 150);
            ctx.lineTo(canvas.width / 2, canvas.height / 2 + 150);
            ctx.stroke();

            requestAnimationFrame(draw);
        }
        draw();

        // Metrics randomizer
        setInterval(() => {
            const latVal = (4 + Math.random() * 3).toFixed(1);
            document.getElementById('lat').innerText = latVal + 'ms';
            document.getElementById('fps').innerText = Math.floor(119 + Math.random() * 2);
        }, 800);
    </script>
</body>

</html>
